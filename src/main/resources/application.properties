spring.application.name=admission

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=studentDb;encrypt=false;trustServerCertificate=true

# IMPORTANT:
# Spring Boot needs a SQL Server LOGIN (username/password). Windows Authentication from SSMS does not work here by default.
# Create a SQL Login in SSMS (Security -> Logins) and put it here.
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
#spring.mail.password=wyekissnzwroartj
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# Max size for uploaded documents (photo, marksheet, ID proof)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# Folder on disk where uploaded files will be saved
# Windows example: C:/bvicam-uploads/
# Linux example:   /var/bvicam-uploads/
app.upload.dir=${UPLOAD_DIR}